<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Token Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --danger: #ef4444;
    --success: #22c55e;
    --warn: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid bg */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(124,58,237,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Auth screen */
  #auth-screen {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    background: var(--bg);
  }

  .auth-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 40px;
    width: 360px;
    text-align: center;
  }

  .auth-box h1 {
    font-family: var(--sans);
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--accent);
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }

  .auth-box p { color: var(--muted); font-size: 0.8rem; margin-bottom: 24px; }

  /* Main app */
  #app { display: none; position: relative; z-index: 1; }

  header {
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(10,10,15,.9);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 10;
  }

  .logo {
    font-family: var(--sans);
    font-weight: 800;
    font-size: 1.1rem;
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--accent); }

  .header-meta { font-size: 0.72rem; color: var(--muted); }

  main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

  /* Stats row */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
  }

  .stat-val {
    font-family: var(--sans);
    font-size: 2rem;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  /* Toolbar */
  .toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }

  /* Table */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }

  th {
    background: rgba(124,58,237,.08);
    color: var(--muted);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
  }

  td {
    padding: 12px 14px;
    border-bottom: 1px solid rgba(30,30,46,.6);
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,.02); }

  .token-cell {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--accent2);
    display: flex; align-items: center; gap: 8px;
    max-width: 200px;
  }

  .token-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
  .token-text:hover { color: #fff; }

  .badge {
    display: inline-flex; align-items: center;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.68rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .badge-on { background: rgba(34,197,94,.15); color: var(--success); }
  .badge-off { background: rgba(239,68,68,.15); color: var(--danger); }

  .usage-bar-wrap {
    display: flex; align-items: center; gap: 8px;
    min-width: 120px;
  }

  .usage-bar {
    flex: 1; height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .usage-bar-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width .4s ease;
  }

  .usage-text { font-size: 0.7rem; color: var(--muted); white-space: nowrap; }

  .actions { display: flex; gap: 6px; }

  /* Inputs & Buttons */
  input, select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.82rem;
    padding: 8px 12px;
    outline: none;
    transition: border-color .15s;
  }

  input:focus, select:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px;
    border: none; border-radius: 6px;
    font-family: var(--mono); font-size: 0.8rem;
    cursor: pointer; transition: all .15s;
    font-weight: 600;
  }

  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #6d28d9; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: rgba(239,68,68,.12); color: var(--danger); border: 1px solid rgba(239,68,68,.2); }
  .btn-danger:hover { background: rgba(239,68,68,.2); }
  .btn-sm { padding: 5px 10px; font-size: 0.72rem; }
  .btn-warn { background: rgba(245,158,11,.12); color: var(--warn); border: 1px solid rgba(245,158,11,.2); }
  .btn-warn:hover { background: rgba(245,158,11,.2); }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.7);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 50;
    opacity: 0; pointer-events: none;
    transition: opacity .2s;
  }

  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    width: 440px;
    max-width: 90vw;
    transform: translateY(20px);
    transition: transform .2s;
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal h2 {
    font-family: var(--sans);
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 20px;
  }

  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .form-group input, .form-group select { width: 100%; }

  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

  /* Toast */
  #toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 18px;
    font-size: 0.8rem;
    z-index: 200;
    transform: translateY(80px); opacity: 0;
    transition: all .25s;
  }

  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.success { border-color: var(--success); color: var(--success); }
  #toast.error { border-color: var(--danger); color: var(--danger); }

  .empty { text-align: center; padding: 48px; color: var(--muted); font-size: 0.85rem; }

  /* Search */
  .search-wrap { position: relative; flex: 1; min-width: 180px; }
  .search-wrap input { width: 100%; padding-left: 34px; }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.85rem; pointer-events: none; }
</style>
</head>
<body>

<!-- Auth -->
<div id="auth-screen">
  <div class="auth-box">
    <h1>Token<span>Admin</span></h1>
    <p>Enter your admin key to continue</p>
    <div class="form-group" style="margin-bottom:12px">
      <input type="password" id="auth-input" placeholder="Admin key..." onkeydown="if(event.key==='Enter')doAuth()" />
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="doAuth()">Authenticate →</button>
    <div id="auth-err" style="color:var(--danger);font-size:.75rem;margin-top:10px;display:none">Invalid key</div>
  </div>
</div>

<!-- App -->
<div id="app">
  <header>
    <div class="logo">Token<span>Admin</span></div>
    <div class="header-meta" id="last-refresh">—</div>
  </header>

  <main>
    <div class="stats">
      <div class="stat">
        <div class="stat-val" id="s-total" style="color:var(--accent)">0</div>
        <div class="stat-label">Total Tokens</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="s-active" style="color:var(--success)">0</div>
        <div class="stat-label">Active</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="s-inactive" style="color:var(--danger)">0</div>
        <div class="stat-label">Disabled</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="s-usage" style="color:var(--accent2)">0</div>
        <div class="stat-label">Total Usage</div>
      </div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="search" placeholder="Search token / label..." oninput="renderTable()" />
      </div>
      <select id="filter" onchange="renderTable()">
        <option value="all">All</option>
        <option value="active">Active</option>
        <option value="inactive">Inactive</option>
      </select>
      <button class="btn btn-ghost" onclick="loadTokens()">↺ Refresh</button>
      <button class="btn btn-primary" onclick="openCreateModal()">+ Add Token</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Token</th>
            <th>Label</th>
            <th>Status</th>
            <th>Usage</th>
            <th>Created</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </main>
</div>

<!-- Create/Edit Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">Add Token</h2>
    <div class="form-group">
      <label class="form-label">Label</label>
      <input type="text" id="f-label" placeholder="User name / description" />
    </div>
    <div class="form-group" id="token-field-wrap">
      <label class="form-label">Token (leave blank to generate)</label>
      <input type="text" id="f-token" placeholder="Auto-generate" />
    </div>
    <div class="form-group">
      <label class="form-label">Max Usage (0 = unlimited)</label>
      <input type="number" id="f-max" value="0" min="0" />
    </div>
    <div class="form-group">
      <label class="form-label">Status</label>
      <select id="f-active">
        <option value="true">Active</option>
        <option value="false">Disabled</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modal-submit" onclick="submitModal()">Create</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  let ADMIN_KEY = '';
  let tokens = [];
  let editingToken = null;

  // ── Auth ──────────────────────────────────────────────
  async function doAuth() {
    const key = document.getElementById('auth-input').value.trim();
    if (!key) return;
    // Test key with a real request
    const res = await fetch('/api/admin', { headers: { 'x-admin-key': key } });
    if (res.ok) {
      ADMIN_KEY = key;
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadTokens();
    } else {
      document.getElementById('auth-err').style.display = 'block';
    }
  }

  // ── API helpers ───────────────────────────────────────
  async function api(method, params = '', body = null) {
    const url = '/api/admin' + (params ? '?' + params : '');
    const opts = {
      method,
      headers: { 'x-admin-key': ADMIN_KEY, 'Content-Type': 'application/json' }
    };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(url, opts);
    return res.json();
  }

  async function loadTokens() {
    const data = await api('GET');
    tokens = data.tokens || [];
    updateStats();
    renderTable();
    document.getElementById('last-refresh').textContent =
      'Refreshed ' + new Date().toLocaleTimeString();
  }

  // ── Stats ─────────────────────────────────────────────
  function updateStats() {
    document.getElementById('s-total').textContent = tokens.length;
    document.getElementById('s-active').textContent = tokens.filter(t => t.active).length;
    document.getElementById('s-inactive').textContent = tokens.filter(t => !t.active).length;
    document.getElementById('s-usage').textContent = tokens.reduce((a, t) => a + t.usageCount, 0);
  }

  // ── Table ─────────────────────────────────────────────
  function renderTable() {
    const q = document.getElementById('search').value.toLowerCase();
    const filter = document.getElementById('filter').value;

    let list = tokens.filter(t => {
      const matchQ = t.token.toLowerCase().includes(q) || t.label.toLowerCase().includes(q);
      const matchF = filter === 'all' || (filter === 'active' ? t.active : !t.active);
      return matchQ && matchF;
    });

    const tbody = document.getElementById('tbody');

    if (!list.length) {
      tbody.innerHTML = '<tr><td colspan="6"><div class="empty">No tokens found</div></td></tr>';
      return;
    }

    tbody.innerHTML = list.map(t => {
      const pct = t.maxUsage > 0 ? Math.min(100, (t.usageCount / t.maxUsage) * 100) : 0;
      const usageLabel = t.maxUsage > 0 ? `${t.usageCount}/${t.maxUsage}` : `${t.usageCount} / ∞`;
      const barColor = pct >= 90 ? 'var(--danger)' : pct >= 60 ? 'var(--warn)' : '';
      const date = new Date(t.createdAt).toLocaleDateString();

      return `<tr>
        <td>
          <div class="token-cell">
            <span class="token-text" title="${t.token}" onclick="copyToken('${t.token}')">${t.token}</span>
          </div>
        </td>
        <td style="color:var(--text)">${escHtml(t.label)}</td>
        <td><span class="badge ${t.active ? 'badge-on' : 'badge-off'}">${t.active ? 'ON' : 'OFF'}</span></td>
        <td>
          <div class="usage-bar-wrap">
            ${t.maxUsage > 0 ? `<div class="usage-bar"><div class="usage-bar-fill" style="width:${pct}%;${barColor ? 'background:'+barColor : ''}"></div></div>` : ''}
            <span class="usage-text">${usageLabel}</span>
          </div>
        </td>
        <td style="color:var(--muted);font-size:.72rem">${date}</td>
        <td>
          <div class="actions">
            <button class="btn btn-ghost btn-sm" onclick="openEditModal('${t.token}')">Edit</button>
            <button class="btn btn-warn btn-sm" onclick="resetUsage('${t.token}')">Reset</button>
            <button class="btn btn-ghost btn-sm" onclick="toggleActive('${t.token}', ${!t.active})">${t.active ? 'Disable' : 'Enable'}</button>
            <button class="btn btn-danger btn-sm" onclick="deleteToken('${t.token}')">Del</button>
          </div>
        </td>
      </tr>`;
    }).join('');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Actions ───────────────────────────────────────────
  async function deleteToken(token) {
    if (!confirm(`Delete token ${token}?`)) return;
    await api('DELETE', 'token=' + encodeURIComponent(token));
    toast('Token deleted', 'success');
    loadTokens();
  }

  async function toggleActive(token, active) {
    await api('PUT', 'token=' + encodeURIComponent(token), { active });
    toast(`Token ${active ? 'enabled' : 'disabled'}`, 'success');
    loadTokens();
  }

  async function resetUsage(token) {
    if (!confirm('Reset usage count?')) return;
    await api('PUT', 'token=' + encodeURIComponent(token), { resetUsage: true });
    toast('Usage reset', 'success');
    loadTokens();
  }

  function copyToken(token) {
    navigator.clipboard.writeText(token).then(() => toast('Copied!', 'success'));
  }

  // ── Modal ─────────────────────────────────────────────
  function openCreateModal() {
    editingToken = null;
    document.getElementById('modal-title').textContent = 'Add Token';
    document.getElementById('modal-submit').textContent = 'Create';
    document.getElementById('token-field-wrap').style.display = '';
    document.getElementById('f-label').value = '';
    document.getElementById('f-token').value = '';
    document.getElementById('f-max').value = '0';
    document.getElementById('f-active').value = 'true';
    document.getElementById('modal').classList.add('open');
  }

  function openEditModal(token) {
    const t = tokens.find(x => x.token === token);
    if (!t) return;
    editingToken = token;
    document.getElementById('modal-title').textContent = 'Edit Token';
    document.getElementById('modal-submit').textContent = 'Save';
    document.getElementById('token-field-wrap').style.display = 'none';
    document.getElementById('f-label').value = t.label;
    document.getElementById('f-max').value = t.maxUsage;
    document.getElementById('f-active').value = String(t.active);
    document.getElementById('modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }

  async function submitModal() {
    const label = document.getElementById('f-label').value.trim() || 'Unnamed';
    const maxUsage = parseInt(document.getElementById('f-max').value) || 0;
    const active = document.getElementById('f-active').value === 'true';

    if (editingToken) {
      await api('PUT', 'token=' + encodeURIComponent(editingToken), { label, maxUsage, active });
      toast('Token updated', 'success');
    } else {
      const customToken = document.getElementById('f-token').value.trim() || undefined;
      const res = await api('POST', '', { label, maxUsage, active, customToken });
      if (res.error) { toast(res.error, 'error'); return; }
      toast('Token created: ' + res.token, 'success');
    }

    closeModal();
    loadTokens();
  }

  // ── Toast ─────────────────────────────────────────────
  let toastTimer;
  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 2500);
  }

  // Close modal on overlay click
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });

  // Enter key on auth
  document.getElementById('auth-input').focus();
</script>
</body>
</html>
